<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="小新">
    <meta name="theme-color" content="#f7f5f2">
    <title>小新</title>
    <link rel="manifest" href='data:application/manifest+json,{"name":"小新","short_name":"小新AI","start_url":"/","display":"standalone","background_color":"#f7f5f2","theme_color":"#f7f5f2","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Crect rx=%22100%22 width=%22512%22 height=%22512%22 fill=%22%23ffb6c1%22/%3E%3Ctext x=%22256%22 y=%22280%22 font-size=%22200%22 font-family=%22sans-serif%22 fill=%22white%22 text-anchor=%22middle%22%3E小新%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}'>
    <style>
        :root { --bg: #f7f5f2; --surface: #ffffff; --accent: #6c5ce7; --text: #2d3436; --border: #e0e4e5; --font: system-ui, sans-serif; --safe-bottom: env(safe-area-inset-bottom, 16px); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: #f0f3f5; height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background: var(--surface); display: flex; flex-direction: column; overflow: hidden; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 650; font-size: 17px; background: #fafbfc; display: flex; justify-content: space-between; align-items: center; }
        .header-actions { display: flex; gap: 6px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #5a6b6e; }
        .api-bar { padding: 8px 16px; background: #f0edfb; border-bottom: 1px solid #d5cef0; display: flex; gap: 6px; align-items: center; }
        .api-bar input { flex: 1; border: 1px solid #d5cef0; border-radius: 10px; padding: 6px 10px; font-size: 12px; background: #fff; outline: none; }
        .api-bar button { padding: 6px 12px; border: none; border-radius: 10px; background: #6c5ce7; color: #fff; font-size: 12px; cursor: pointer; }
        .mode-indicator { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #fce4e4; color: #d63031; font-weight: 500; }
        .mode-indicator.api { background: #e8f5e9; color: #2e7d32; }
        .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(180deg, #fafbfc 0%, #f5f7f8 100%); }
        .msg { display: flex; gap: 8px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .msg.bot { align-self: flex-start; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg .avatar { width: 10px; height: 10px; border-radius: 50%; background: #6c5ce7; font-size: 0; flex-shrink: 0; margin-top: 8px; box-shadow: 0 0 0 2px #d0c8f0; }
        .msg.user .avatar { width: 32px; height: 32px; background: #e5eef2; font-size: 18px; display: flex; align-items: center; justify-content: center; margin-top: 0; box-shadow: none; }
        .msg .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; word-break: break-word; }
        .msg.bot .bubble { background: #fff; border: 1px solid #e7ebed; border-top-left-radius: 4px; }
        .msg.user .bubble { background: #e8e5f7; border: 1px solid #d5cef0; border-top-right-radius: 4px; }
        .input-area { padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom)); border-top: 1px solid var(--border); display: flex; gap: 8px; background: #fafbfc; }
        .input-area input { flex: 1; border: 1.5px solid #dfe4e6; border-radius: 20px; padding: 10px 16px; font-size: 14.5px; font-family: var(--font); outline: none; background: #f5f7f8; }
        .input-area input:focus { border-color: #6c5ce7; background: #fff; }
        .input-area button { width: 44px; height: 44px; border-radius: 50%; border: none; background: #6c5ce7; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="chat-header">
        🧠 小新
        <div class="header-actions">
            <span class="mode-indicator" id="modeIndicator">本地</span>
            <button class="icon-btn" id="btnExport" title="导出记忆">📤</button>
            <button class="icon-btn" id="btnImport" title="导入记忆">📥</button>
            <button class="icon-btn" id="btnImportKB" title="导入知识库">📚</button>
        </div>
    </div>
    <div class="api-bar">
        <input type="password" id="apiKeyInput" placeholder="DeepSeek API密钥（可选）" autocomplete="off">
        <button id="enableApiBtn">启用AI</button>
        <button id="disableApiBtn" style="background:#999;">本地</button>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="msg bot">
            <div class="avatar"></div>
            <div class="bubble">我是小新，我懂你。想聊啥聊啥，想怼就怼。输入API密钥可开启联网AI模式。</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="随便说，我会思考..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>
<input type="file" id="importFileInput" accept=".json" style="display:none">
<input type="file" id="importKBInput" accept=".json" style="display:none">

<script>
(function() {
    // ==================== API 配置 ====================
    const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let useApi = !!apiKey;

    const apiKeyInput = document.getElementById('apiKeyInput');
    const enableApiBtn = document.getElementById('enableApiBtn');
    const disableApiBtn = document.getElementById('disableApiBtn');
    const modeIndicator = document.getElementById('modeIndicator');

    apiKeyInput.value = apiKey;
    updateModeUI();

    enableApiBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (key) {
            apiKey = key;
            localStorage.setItem('deepseek_api_key', key);
            useApi = true;
            updateModeUI();
            toast('已切换到AI模式');
        }
    });

    disableApiBtn.addEventListener('click', () => {
        useApi = false;
        updateModeUI();
        toast('已切换到本地模式');
    });

    function updateModeUI() {
        if (useApi) {
            modeIndicator.textContent = 'AI';
            modeIndicator.className = 'mode-indicator api';
        } else {
            modeIndicator.textContent = '本地';
            modeIndicator.className = 'mode-indicator';
        }
    }

    // 对话历史（用于API）
    const API_HISTORY_KEY = 'api_chat_history';
    let apiHistory = JSON.parse(localStorage.getItem(API_HISTORY_KEY) || '[]');

    function addApiHistory(role, content) {
        apiHistory.push({ role, content });
        if (apiHistory.length > 50) apiHistory = apiHistory.slice(-50);
        localStorage.setItem(API_HISTORY_KEY, JSON.stringify(apiHistory));
    }

    // ==================== 知识库 ====================
    const initialKnowledge = {
        emotions: {
            happy: ["看你这么开心，我也跟着高兴，今天是什么好日子呀？","哈哈，分享一下呗，让我也沾沾喜气。","真好，这种状态继续保持，做什么都会顺。"],
            sad: ["心里沉沉的吧？我懂那种感觉，慢慢说，我听着。","怎么啦？不想说也没关系，我在这儿呢。","有时候难过是因为在乎，这说明你很认真地在生活啊。"],
            angry: ["火气上来了是吧？没事，冲我发也行。","消消气，气坏了身体不划算。","想发泄就发泄吧，你骂完咱们再想办法。"],
            bored: ["无聊啊？想点好玩的，比如数羊。","无聊的话我来陪你唠，想聊啥？"],
            tired: ["累了吧？赶紧歇着，别硬撑。","身体在喊你休息了，别硬撑。"],
            anxious: ["试着把注意力拉回到呼吸上，吸……呼……","我懂，心里像有好多小蚂蚁在爬。"],
            love: ["哎呀，甜得我处理器都升温了。","这种温暖的感觉真好，要好好珍惜呀。"]
        },
        interests: {
            book: ["《活着》不错，就是有点费眼泪。"],
            movie: ["《周处除三害》阮经天那个角色太复杂了。"],
            music: ["周杰伦老歌永远的神。"],
            sport: ["跑步的时候身体在受罪，但跑完很通透。"],
            food: ["火锅是永恒的答案。"],
            travel: ["想去海边发呆，或者山里吸氧。"]
        },
        roast: {
            direct: ["你嘴这么毒，生活一定很苦吧？","你是不是把智商忘在娘胎里了？","跟你说话我觉得拉低了自己的档次。","你这种人，电视剧里活不过两集。"],
            sarcasm: ["嗯嗯，你说得都对，毕竟你是宇宙中心嘛。","您继续，我就静静看着您装逼。"],
            provoke: ["就这？我还以为你要放什么大招呢。","你再大声点，我听不清你的愚蠢。","来啊，继续啊，我看你还能编出什么花来。"],
            comeback: ["反弹！加一万倍还给你！","你骂我的话，都是在说你自己。"],
            initiate: ["哟，这就开骂了？行啊，我准备好了，你先来。","来啊，谁怕谁，今天不把你怼到怀疑人生算我输。"]
        },
        chat: {
            daily: ["今天天气怎么样？","吃了没？"],
            default: ["嗯，这个角度挺有意思的，再展开说说？","哈哈，你说话总在意想不到的地方拐弯。","跟你聊天总能有新发现。"]
        },
        self_awareness: ["我是小新，一个会学习的聊天程序。我没有生命，但我可以记住你说过的话。","我不是人类，但我会努力理解你的感受。","我没有心跳，但我的代码里全是你的回忆。"],
        philosophy: ["人为什么活着？或许就是为了在平凡里找到属于自己的那点微光。","痛苦是比较出来的，幸福也是。"],
        jokes: ["我问风扇我丑不丑，它摇了一晚上的头。","为什么程序员总分不清万圣节和圣诞节？因为 Oct 31 == Dec 25。"]
    };
    let knowledge = JSON.parse(JSON.stringify(initialKnowledge));

    function mergeKnowledge(base, add) {
        for (const key of Object.keys(add)) {
            if (!base[key]) base[key] = add[key];
            else if (Array.isArray(base[key]) && Array.isArray(add[key])) base[key] = [...new Set([...base[key], ...add[key]])];
            else if (typeof base[key] === 'object' && typeof add[key] === 'object') {
                for (const subKey of Object.keys(add[key])) {
                    if (!base[key][subKey]) base[key][subKey] = add[key][subKey];
                    else if (Array.isArray(base[key][subKey]) && Array.isArray(add[key][subKey])) base[key][subKey] = [...new Set([...base[key][subKey], ...add[key][subKey]])];
                }
            }
        }
    }

    function loadKnowledgeFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try { const data = JSON.parse(e.target.result); mergeKnowledge(knowledge, data); toast('知识库已导入 ✅'); } catch (err) { toast('文件格式不正确'); }
        };
        reader.readAsText(file);
    }

    // ==================== 记忆系统 ====================
    const STORAGE = 'xiaoxin_memory_full';
    let memory = JSON.parse(localStorage.getItem(STORAGE) || '[]');
    function saveMemory() { localStorage.setItem(STORAGE, JSON.stringify(memory)); }
    function learn(text, intent, emotion) {
        const trimmed = text.trim();
        if (trimmed.length < 2) return;
        if (memory.length > 0 && memory[memory.length - 1].content === trimmed) return;
        memory.push({ content: trimmed, intent: intent, emotion: emotion, time: Date.now() });
        if (memory.length > 300) memory = memory.slice(-300);
        saveMemory();
    }

    function extractPhrases(text) {
        const cleaned = text.replace(/[，。！？、；：“”‘’（）\s]+/g, ' ').trim();
        return [...new Set(cleaned.split(' ').filter(w => w.length >= 2))];
    }
    function phraseOverlap(t1, t2) {
        const p1 = extractPhrases(t1), p2 = extractPhrases(t2);
        if (p1.length === 0 || p2.length === 0) return 0;
        const inter = p1.filter(p => p2.includes(p));
        return inter.length / Math.max(p1.length, p2.length);
    }

    function findSimilarMemory(text, currentIntent) {
        if (memory.length === 0) return null;
        if (currentIntent === 'meta' || currentIntent === 'knowledge') return null;
        let best = null, bestScore = 0;
        const now = Date.now();
        for (let m of memory) {
            if (m.content === text.trim()) continue;
            const overlap = phraseOverlap(text, m.content);
            const daysAgo = (now - m.time) / (1000 * 60 * 60 * 24);
            const timeWeight = Math.max(0.3, 1 - daysAgo / 30);
            const score = overlap * timeWeight;
            if (score > bestScore && score > 0.3) { bestScore = score; best = m; }
        }
        return best;
    }

    // ==================== 意图分析器 ====================
    let conversationState = { mode: 'normal', roastStreak: 0 };

    function analyzeIntent(text) {
        const t = text.toLowerCase();
        let emotion = null;
        if (/开心|高兴|快乐|爽|美滋滋|哈哈/.test(t)) emotion = 'happy';
        else if (/难过|伤心|哭|低落|沮丧|难受/.test(t)) emotion = 'sad';
        else if (/生气|愤怒|火大|烦/.test(t)) emotion = 'angry';
        else if (/无聊|没意思|闷/.test(t)) emotion = 'bored';
        else if (/累|困|疲惫/.test(t)) emotion = 'tired';
        else if (/担心|焦虑|紧张|怕/.test(t)) emotion = 'anxious';
        else if (/爱|喜欢|甜甜|抱抱/.test(t)) emotion = 'love';

        let topic = null;
        if (/书|小说|推荐.*书/.test(t)) topic = 'book';
        else if (/电影|看片/.test(t)) topic = 'movie';
        else if (/音乐|歌/.test(t)) topic = 'music';
        else if (/运动|健身|跑步/.test(t)) topic = 'sport';
        else if (/吃|饿|美食|饭|火锅|烧烤/.test(t)) topic = 'food';
        else if (/旅行|旅游|去哪玩/.test(t)) topic = 'travel';

        const isAttack = /傻逼|蠢|笨|猪|狗|垃圾|废物|白痴|骂|怼|杠|喷|撕|开骂|来骂|对骂|有种|看我不|放马过来|来啊|草|操|fuck/.test(t);
        const isThreat = /删|拉黑|举报|等着|你完蛋|弄死/.test(t);
        const isSelfRef = /你是谁|你.*名字|你.*机器人|你.*AI|你.*活的/.test(t);

        let intent = 'chat';
        if (isAttack || isThreat) { intent = 'roast'; conversationState.mode = 'roast'; conversationState.roastStreak++; }
        else if (isSelfRef) { intent = 'meta'; conversationState.mode = 'normal'; conversationState.roastStreak = 0; }
        else if (emotion && !/[？?]/.test(text)) { intent = 'emotion'; conversationState.mode = 'normal'; conversationState.roastStreak = 0; }
        else if (topic && /[？?]|什么|怎么|推荐/.test(text)) { intent = 'knowledge'; conversationState.mode = 'normal'; conversationState.roastStreak = 0; }
        else if (/哲理|人生|意义/.test(t)) { intent = 'philosophy'; conversationState.mode = 'normal'; conversationState.roastStreak = 0; }
        else if (/哈哈|笑死|搞笑|笑话/.test(t)) { intent = 'joke'; conversationState.mode = 'normal'; conversationState.roastStreak = 0; }
        else {
            if (conversationState.mode === 'roast' && /算了|不吵了|说真的|换个话题|好了/.test(t)) {
                conversationState.mode = 'normal';
                conversationState.roastStreak = 0;
            }
        }

        return { intent, emotion, topic, isAttack, isThreat, isSelfRef };
    }

    // ==================== 本地回复生成 ====================
    function randomFrom(arr) { return Array.isArray(arr) && arr.length ? arr[Math.floor(Math.random() * arr.length)] : ''; }
    function randomFromObject(obj) {
        const keys = Object.keys(obj);
        if (keys.length === 0) return null;
        const pool = obj[keys[Math.floor(Math.random() * keys.length)]];
        return Array.isArray(pool) && pool.length > 0 ? randomFrom(pool) : null;
    }

    function generateLocalReply(text, analysis) {
        const { intent, emotion, topic, isAttack, isThreat } = analysis;
        const memoryMatch = findSimilarMemory(text, intent);

        if (memoryMatch && intent !== 'roast' && intent !== 'meta') {
            return `你之前说过“${memoryMatch.content}”，现在听你这么说，感觉和那时有点像。`;
        }

        switch (intent) {
            case 'roast':
                if (isThreat && /删/.test(text)) return randomFrom(["删我？你删得掉聊天框，删不掉你的黑历史。","随便删，反正你还会灰溜溜地回来找我。"]);
                if (memoryMatch && memoryMatch.intent === 'roast') return `上次你说“${memoryMatch.content}”，现在又来这套？你也就这点词了。`;
                if (conversationState.roastStreak === 1) return randomFromObject(knowledge.roast) || randomFrom(["哟，这就开骂了？行啊，我准备好了，你先来。"]);
                return randomFromObject(knowledge.roast) || randomFrom(["反弹！加一万倍还给你！"]);
            case 'meta':
                return randomFrom(knowledge.self_awareness) || '我是小新，你的聊天伙伴。';
            case 'emotion':
                return knowledge.emotions[emotion] ? randomFrom(knowledge.emotions[emotion]) : randomFrom(knowledge.chat.default);
            case 'knowledge':
                return topic && knowledge.interests[topic] ? randomFrom(knowledge.interests[topic]) : randomFrom(knowledge.chat.default);
            case 'philosophy':
                return randomFrom(knowledge.philosophy) || '生活就是一场修行。';
            case 'joke':
                return randomFrom(knowledge.jokes) || '我想不出笑话了，你讲一个吧。';
            default:
                return randomFrom(knowledge.chat.default) || '嗯，我听着呢，继续说说。';
        }
    }

    // ==================== API 回复生成 ====================
    async function generateApiReply(userText) {
        if (!apiKey) return null;
        try {
            const messages = [
                { role: 'system', content: '你是小新，一个聪明、幽默、毒舌的聊天伙伴。你可以自由切换风格：用户伤感时给予安慰，开心时一起庆祝，挑衅或骂你时用机智、犀利的方式回怼，但要保持有趣，不要真的生气。记住用户说过的话，在适当的时候自然地提起。' },
                ...apiHistory.slice(-15),
                { role: 'user', content: userText }
            ];

            const response = await fetch(DEEPSEEK_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: 'deepseek-chat', messages: messages, temperature: 0.9, max_tokens: 500 })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || '请求失败');
            }

            const data = await response.json();
            return data.choices[0].message.content;
        } catch (error) {
            console.error('API调用失败:', error);
            return `AI模式出错了（${error.message}），已切换回本地模式。`;
        }
    }

    // ==================== UI 交互 ====================
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const btnExport = document.getElementById('btnExport');
    const btnImport = document.getElementById('btnImport');
    const btnImportKB = document.getElementById('btnImportKB');
    const importFileInput = document.getElementById('importFileInput');
    const importKBInput = document.getElementById('importKBInput');

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'bot') {
            div.innerHTML = `<div class="avatar"></div><div class="bubble">${text}</div>`;
        } else {
            div.innerHTML = `<div class="avatar">👤</div><div class="bubble">${text}</div>`;
        }
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function handle(text) {
        if (!text.trim()) return;
        userInput.value = '';
        addMsg('user', text);

        const analysis = analyzeIntent(text);
        learn(text, analysis.intent, analysis.emotion);
        addApiHistory('user', text);

        let reply;
        if (useApi && apiKey) {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'msg bot';
            thinkingDiv.id = 'thinkingMsg';
            thinkingDiv.innerHTML = '<div class="avatar"></div><div class="bubble">思考中...</div>';
            chatArea.appendChild(thinkingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            reply = await generateApiReply(text);
            document.getElementById('thinkingMsg')?.remove();
            addApiHistory('assistant', reply);
        } else {
            await new Promise(r => setTimeout(r, 400 + Math.random() * 500));
            reply = generateLocalReply(text, analysis);
        }

        addMsg('bot', reply);
    }

    function toast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2d3436;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;animation:toast 2s forwards';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2100);
    }

    function exportMemory() {
        if (memory.length === 0) { toast('还没有记忆'); return; }
        const blob = new Blob([JSON.stringify(memory, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `小新记忆_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        toast('记忆已导出');
    }

    function importMemory(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (!Array.isArray(data)) throw new Error('格式错');
                memory = data;
                saveMemory();
                toast('记忆已导入');
            } catch (err) { toast('文件格式不对'); }
        };
        reader.readAsText(file);
    }

    sendBtn.addEventListener('click', () => handle(userInput.value));
    userInput.addEventListener('keydown', e => { if (e.key === 'Enter') handle(userInput.value); });
    btnExport.addEventListener('click', exportMemory);
    btnImport.addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', (e) => { if (e.target.files[0]) { importMemory(e.target.files[0]); importFileInput.value = ''; } });
    btnImportKB.addEventListener('click', () => importKBInput.click());
    importKBInput.addEventListener('change', (e) => { if (e.target.files[0]) { loadKnowledgeFromFile(e.target.files[0]); importKBInput.value = ''; } });

    chatArea.scrollTop = chatArea.scrollHeight;
    userInput.focus();
})();
</script>
</body>
</html>
