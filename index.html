<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小新</title>
    <<link rel="manifest" href="/manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background: #f0f3f5; height: 100vh; display: flex; justify-content: center; align-items: center; color: #2d3436; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 16px; border-bottom: 1px solid #e0e4e5; font-weight: bold; background: #fafbfc; display: flex; justify-content: space-between; align-items: center; }
        .icon-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #e0e4e5; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .api-bar { padding: 8px 16px; background: #f0edfb; border-bottom: 1px solid #d5cef0; display: flex; gap: 6px; align-items: center; }
        .api-bar input { flex: 1; border: 1px solid #d5cef0; border-radius: 10px; padding: 6px 10px; font-size: 12px; background: #fff; outline: none; }
        .api-bar button { padding: 6px 12px; border: none; border-radius: 10px; background: #6c5ce7; color: #fff; font-size: 12px; cursor: pointer; }
        .mode-indicator { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #fce4e4; color: #d63031; font-weight: 500; }
        .mode-indicator.api { background: #e8f5e9; color: #2e7d32; }
        .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f5f7f8; }
        .msg { display: flex; gap: 8px; max-width: 85%; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .msg.bot { align-self: flex-start; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; word-break: break-word; }
        .msg.bot .bubble { background: #fff; border: 1px solid #e7ebed; }
        .msg.user .bubble { background: #fce4e4; border: 1px solid #f5c6cb; }
        .input-area { padding: 12px; border-top: 1px solid #e0e4e5; display: flex; gap: 8px; background: #fafbfc; }
        .input-area input { flex: 1; border: 1.5px solid #e0e4e5; border-radius: 20px; padding: 10px; font-size: 14px; outline: none; }
        .input-area button { width: 44px; height: 44px; border-radius: 50%; border: none; background: #d63031; color: #fff; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="chat-header">
        🧠 小新
        <span class="mode-indicator" id="modeIndicator">本地</span>
    </div>
    <div class="api-bar">
        <input type="password" id="apiKeyInput" placeholder="DeepSeek API密钥（可选）" autocomplete="off">
        <button id="enableApiBtn">启用AI</button>
        <button id="disableApiBtn" style="background:#999;">本地</button>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="msg bot">
            <div class="bubble">我是小新！想聊啥聊啥，怼我我也接着。输入API密钥可开启联网AI模式。</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="随便说，我会思考..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>
<script>
(function() {
    const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let useApi = !!apiKey;

    const modeIndicator = document.getElementById('modeIndicator');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const enableApiBtn = document.getElementById('enableApiBtn');
    const disableApiBtn = document.getElementById('disableApiBtn');
    apiKeyInput.value = apiKey;
    updateModeUI();

    enableApiBtn.onclick = () => {
        const key = apiKeyInput.value.trim();
        if (key) {
            apiKey = key;
            localStorage.setItem('deepseek_api_key', key);
            useApi = true;
            updateModeUI();
            toast('已切换到AI模式');
        }
    };
    disableApiBtn.onclick = () => {
        useApi = false;
        updateModeUI();
        toast('已切换到本地模式');
    };

    function updateModeUI() {
        if (useApi) {
            modeIndicator.textContent = 'AI';
            modeIndicator.className = 'mode-indicator api';
        } else {
            modeIndicator.textContent = '本地';
            modeIndicator.className = 'mode-indicator';
        }
    }

    // 聊天功能
    const roasts = ["你嘴这么毒，生活一定很苦吧？","反弹！加一万倍还给你！","就这？","嗯嗯，你说得都对。","你这种人，电视剧里活不过两集。"];
    const normal = ["嗯，然后呢？","有意思。","你继续。","我记住了。"];
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerHTML = '<div class="bubble">' + text + '</div>';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function send() {
        const text = userInput.value.trim();
        if (!text) return;
        addMsg('user', text);
        userInput.value = '';

        if (useApi && apiKey) {
            try {
                const resp = await fetch(DEEPSEEK_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: '你是小新，一个聪明、幽默、毒舌的聊天伙伴。可以自由切换风格，包括回怼。' },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.9, max_tokens: 300
                    })
                });
                const data = await resp.json();
                const reply = data.choices?.[0]?.message?.content || '（API返回为空）';
                addMsg('bot', reply);
            } catch (e) {
                addMsg('bot', 'AI模式出错了，已切回本地。' + e.message);
                useApi = false;
                updateModeUI();
            }
        } else {
            setTimeout(() => {
                const isAttack = /傻逼|蠢|笨|猪|狗|垃圾|废物|白痴|骂|怼|操|fuck/i.test(text);
                const reply = isAttack ? roasts[Math.floor(Math.random()*roasts.length)] : normal[Math.floor(Math.random()*normal.length)];
                addMsg('bot', reply);
            }, 400);
        }
    }

    sendBtn.onclick = send;
    userInput.onkeydown = (e) => { if (e.key === 'Enter') send(); };

    function toast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2d3436;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
})();
</script>
</body>
</html>
